apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: knodex-tilt

resources:
  - ../../../deploy/server
  - ../../../deploy/redis
  - ../../../deploy/postgres

# Use local dev images
images:
  - name: knodex-server
    newName: knodex-server-dev
    newTag: latest

# Rename namespace from knodex to knodex-tilt
patches:
  # Patch the namespace resource itself
  - target:
      kind: Namespace
      name: knodex
    patch: |
      - op: replace
        path: /metadata/name
        value: knodex-tilt
      - op: add
        path: /metadata/labels/environment
        value: tilt

  # Fix ClusterRoleBinding to reference knodex-tilt namespace
  - target:
      kind: ClusterRoleBinding
      name: knodex
    patch: |
      - op: replace
        path: /subjects/0/namespace
        value: knodex-tilt

  # Fix Gatekeeper ClusterRoleBinding namespace
  - target:
      kind: ClusterRoleBinding
      name: knodex-gatekeeper-reader
    patch: |
      - op: replace
        path: /subjects/0/namespace
        value: knodex-tilt

  # Remove security context for dev containers (running as root for hot-reload)
  - target:
      kind: Deployment
      name: knodex-server
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext
      - op: remove
        path: /spec/template/spec/containers/0/securityContext
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: remove
        path: /spec/template/spec/containers/0/readinessProbe
      - op: remove
        path: /spec/template/spec/containers/0/livenessProbe
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

  # Set known JWT signing key for E2E test token validation
  - target:
      kind: Secret
      name: knodex-secret
    patch: |
      - op: replace
        path: /stringData/server.secretkey
        value: "test-jwt-secret-key-for-qa-testing-only"

  # Configure Redis address
  - target:
      kind: ConfigMap
      name: knodex-config
    patch: |
      - op: add
        path: /data/REDIS_ADDRESS
        value: "knodex-redis:6379"
      - op: add
        path: /data/DATABASE_URL
        value: "postgres://knodex:knodex@knodex-postgres:5432/knodex?sslmode=disable"
      - op: add
        path: /data/ADMIN_USERNAME
        value: "admin"
      - op: add
        path: /data/JWT_SECRET
        value: "tilt-dev-jwt-secret-key-minimum-32chars"
      - op: add
        path: /data/CASBIN_ADMIN_USERS
        value: "user-global-admin"
      - op: add
        path: /data/SWAGGER_UI_ENABLED
        value: "true"
      - op: add
        path: /data/KNODEX_LICENSE_TEXT
        value: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJsaWNlbnNlLmtub2RleC5pbyIsInN1YiI6ImUyZS10ZXN0LWN1c3RvbWVyIiwiZXhwIjoyMDg5NDAzNzk3LCJpYXQiOjE3NzQwNDAxOTcsImZlYXR1cmVzIjpbImNvbXBsaWFuY2UiLCJ2aWV3cyIsInNlY3JldHMiXSwibWF4VXNlcnMiOjk5OTksImxpY2Vuc2VJZCI6ImxpY19lMmVfdGVzdCIsImVkaXRpb24iOiJlbnRlcnByaXNlIn0.Cwe2cyuRZBi-fAq3Ii7GPDI1nw2Cyy1Ts22uo4cYl52HQa1kiFM4XmqVzPhh3n0iTOksOpxLcNxlHc1mswAkpw"

  # Populate views configuration with categories matching example RGDs
  - target:
      kind: ConfigMap
      name: knodex-views
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: knodex-views
      data:
        views.yaml: |
          views:
            - name: Applications
              slug: applications
              icon: app-window
              category: applications
              order: 1
              description: Application deployment templates
            - name: Infrastructure
              slug: infrastructure
              icon: server
              category: infrastructure
              order: 2
              description: Infrastructure provisioning templates
            - name: Observability
              slug: observability
              icon: activity
              category: observability
              order: 3
              description: Monitoring and observability resources
            - name: Examples
              slug: examples
              icon: flask-conical
              category: examples
              order: 4
              description: Example and tutorial RGDs

# Use labels instead of deprecated commonLabels
labels:
  - pairs:
      app: knodex
      environment: tilt
      managed-by: tilt
    includeSelectors: false
