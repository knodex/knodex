kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: knodex-qa
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Unified server (API + embedded web) - NodePort 30080 mapped to host port 8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
