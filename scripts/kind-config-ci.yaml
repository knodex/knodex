kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # NodePort 30080 mapped to host port 8080 (same as local dev config)
      # Eliminates need for kubectl port-forward which drops under load
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
