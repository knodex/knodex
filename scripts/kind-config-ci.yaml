kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # No extraPortMappings - CI uses kubectl port-forward instead
    # Port mappings don't work reliably in DinD (ARC runner) environments
