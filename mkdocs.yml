site_name: knodex Documentation
site_description: Kubernetes Resource Orchestrator Dashboard - Visualization and management for KRO ResourceGraphDefinitions
site_author: Knodex Authors
repo_url: https://github.com/knodex/knodex
repo_name: knodex/knodex
edit_uri: edit/main/docs/
docs_dir: docs-site

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Prerequisites: getting-started/prerequisites.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Operator Manual:
      - operator-manual/index.md
      - Installation: operator-manual/installation.md
      - Configuration: operator-manual/configuration.md
      - RBAC Setup: operator-manual/rbac-setup.md
      - OIDC Integration: operator-manual/oidc-integration.md
      - Kubernetes RBAC: operator-manual/kubernetes-rbac.md
      - Troubleshooting: operator-manual/troubleshooting.md
  - Platform Guide:
      - platform-guide/index.md
      - Organizations: platform-guide/organizations.md
      - Members: platform-guide/members.md
      - Repositories: platform-guide/repositories.md
      - Credentials: platform-guide/credentials.md
      - Deployment Modes: platform-guide/deployment-modes.md
  - User Guide:
      - user-guide/index.md
      - Browsing Catalog: user-guide/browsing-catalog.md
      - Deploying Instances: user-guide/deploying-instances.md
      - Managing Instances: user-guide/managing-instances.md
      - Viewing Logs: user-guide/viewing-logs.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/knodex/knodex
      name: knodex on GitHub
  version:
    provider: mike
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by creating an issue.

