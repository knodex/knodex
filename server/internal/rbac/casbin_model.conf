# knodex Casbin RBAC Model
# Based on ArgoCD's Casbin model with simplifications
# Reference: https://github.com/argoproj/argo-cd/blob/master/assets/model.conf

[request_definition]
# Request format: subject, object, action
# Example: "user:alice", "projects/engineering-project", "get"
r = sub, obj, act

[policy_definition]
# Policy format: subject, object, action, effect
# Example: "role:serveradmin", "projects/*", "*", "allow"
p = sub, obj, act, eft

[role_definition]
# g: User to role mapping
# Example: g, user:alice, role:serveradmin
g = _, _

# g2: Role inheritance
# Example: g2, role:developer, role:viewer
g2 = _, _

[policy_effect]
# Allow if any policy explicitly allows and no policy denies
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
# Match if:
# 1. Subject has role (via g) OR role inherits role (via g2)
# 2. Object matches policy object (keyMatch pattern)
# 3. Action matches policy action (keyMatch pattern)
#
# NOTE: We intentionally do NOT use Casbin's "super admin" matcher pattern
# (r.sub == "root" short-circuit) because our policy effect uses deny rules:
#   e = some(where (p.eft == allow)) && !some(where (p.eft == deny))
# A matcher short-circuit would bypass deny policy evaluation, allowing admins
# to access resources with explicit deny policies. Admin access is instead
# granted via the wildcard policy: ("role:serveradmin", "*", "*", "allow").
#
# Using keyMatch instead of globMatch because:
# - keyMatch treats * as matching ANY substring (including /)
# - This allows "instances/*" to match "instances/proj-name/*"
# - Enables built-in roles (instances/*) to work with project-scoped checks (instances/{projectId}/*)
m = (g(r.sub, p.sub) || g2(r.sub, p.sub)) && keyMatch(r.obj, p.obj) && keyMatch(r.act, p.act)
