apiVersion: apps/v1
kind: Deployment
metadata:
  name: knodex-server
  labels:
    app.kubernetes.io/name: knodex
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # Multi-replica rolling update strategy:
  # maxUnavailable: 0 ensures no downtime during rolling deployments.
  # maxSurge: 1 creates one new pod before terminating old pods.
  # This prevents forced re-logins during deployments (AC #5).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knodex
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knodex
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: knodex
      # Allow in-flight requests to complete during rolling deployments.
      # The preStop hook sleeps 5s to let the load balancer deregister the
      # pod before the server begins its graceful shutdown (30s timeout).
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: knodex-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: knodex-config
          # preStop hook: sleep 5s to allow the Service/Ingress controller to
          # deregister this pod from its endpoints before the process stops
          # accepting new connections. This prevents 502/503 errors during
          # rolling deployments with 2+ replicas (AC #5).
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: views-config
              mountPath: /etc/knodex/views.yaml
              subPath: views.yaml
              readOnly: true
            - name: license
              mountPath: /etc/knodex/license.jwt
              subPath: license.jwt
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: views-config
          configMap:
            name: knodex-views
            optional: true  # Allow deployment without views ConfigMap (OSS builds)
        - name: license
          secret:
            secretName: knodex-license
            optional: true  # Allow deployment without license Secret (OSS builds)
