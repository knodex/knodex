apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knodex-secret-manager
  namespace: knodex
  labels:
    app.kubernetes.io/name: knodex
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: kustomize
rules:
  # Allow creating and reading the admin password secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get"]
    resourceNames: ["knodex-initial-admin-password"]
  # Allow full management of repository secrets (ArgoCD-style pattern)
  # Required for creating, updating, listing, and deleting repository secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knodex-secret-manager
  namespace: knodex
  labels:
    app.kubernetes.io/name: knodex
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knodex-secret-manager
subjects:
  - kind: ServiceAccount
    name: knodex
    namespace: knodex
