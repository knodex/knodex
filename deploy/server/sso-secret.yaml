apiVersion: v1
kind: Secret
metadata:
  name: knodex-sso-secrets
  labels:
    app.kubernetes.io/name: knodex
    app.kubernetes.io/component: sso
type: Opaque
# Credentials for OIDC providers configured in knodex-sso-providers ConfigMap.
# Key format: {provider-name}.client-id, {provider-name}.client-secret
#
# Example:
# stringData:
#   azuread.client-id: "your-client-id"
#   azuread.client-secret: "your-client-secret"
