{{- /*
Embedded PostgreSQL DSN Secret — renders only when the Bitnami postgresql
subchart is enabled AND postgres.deploymentMode is configured. Assembles the
full DATABASE_URL DSN from the subchart auth values and the well-known Bitnami
service hostname (<release>-postgresql:5432).

The Bitnami postgresql subchart stores only the raw password in its Secret
(key: postgres-password), not a full DSN. Helm cannot interpolate a
secretKeyRef value into another string field, so this template builds the full
DSN from the plaintext auth values provided in values.yaml.

Annotated with helm.sh/resource-policy: keep so an accidental chart uninstall
does not destroy the credential (mirrors the postgres-secret.yaml pattern).
*/ -}}
{{- if and .Values.postgresql.enabled (include "knodex.postgresEnabled" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-knodex-postgres-url
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "knodex.postgresql.fullname" .) .Values.postgresql.auth.database | quote }}
{{- end }}
