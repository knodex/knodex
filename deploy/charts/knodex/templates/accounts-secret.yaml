# STORY-148: Local user accounts Secret (ArgoCD pattern)
# This Secret stores credentials for local accounts:
#   - accounts.<username>.password: bcrypt hash of password
#   - accounts.<username>.passwordMtime: RFC3339 timestamp of last password change
#   - accounts.<username>.tokens: JSON array of API tokens
#
# The server will create this Secret automatically if it doesn't exist.
# Password hashing is handled by the server on first login or password reset.
{{- if .Values.server.auth.localAccounts.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "knodex.fullname" . }}-secret
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  {{- range $username, $account := .Values.server.auth.localAccounts.accounts }}
  {{- if $account.password }}
  # Pre-hashed password for {{ $username }}
  # To generate: echo -n 'password' | htpasswd -bnBC 12 "" - | tr -d ':\n'
  accounts.{{ $username }}.password: {{ $account.password | quote }}
  accounts.{{ $username }}.passwordMtime: {{ now | date "2006-01-02T15:04:05Z07:00" | quote }}
  {{- end }}
  {{- end }}
{{- end }}
