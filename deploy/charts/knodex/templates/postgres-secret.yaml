{{- /*
Chart-managed Postgres credential. Rendered ONLY when:
  1. enterprise.enabled is true AND postgres.deploymentMode is set, AND
  2. operator supplied an inline DSN via enterprise.postgres.connectionString, AND
  3. operator did NOT also point enterprise.postgres.connectionStringSecret.name at
     an external Secret (external Secret wins — see _helpers.tpl knodex.postgresSecretRef).

Annotated `helm.sh/resource-policy: keep` so a chart uninstall does not
destroy operator-managed credentials. Replaces the redis-password-secret
pattern but as plain manifest (no Helm hook needed; the value is known at
template time, unlike the Redis password which is generated at install time).
*/ -}}
{{- if and (include "knodex.postgresEnabled" .) .Values.enterprise.postgres.connectionString (not .Values.enterprise.postgres.connectionStringSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "knodex.postgresSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  DATABASE_URL: {{ .Values.enterprise.postgres.connectionString | b64enc }}
{{- end }}
