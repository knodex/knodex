{{- if .Values.redis.enabled }}
{{- /* Create the chart-managed secret unless the user supplied a custom existingSecret (not our default tpl expression) */}}
{{- $isChartManaged := or (not .Values.redis.auth.existingSecret) (contains "knodex.redisSecretName" .Values.redis.auth.existingSecret) }}
{{- if $isChartManaged }}
{{- $secretName := include "knodex.redisSecretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $existingSecret }}
  redis-password: {{ index $existingSecret.data "redis-password" }}
  {{- else if .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | b64enc }}
  {{- else }}
  redis-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
