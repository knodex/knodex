{{- if .Values.redis.enabled }}
{{- $isChartManaged := or (not .Values.redis.auth.existingSecret) (contains "knodex.redisSecretName" .Values.redis.auth.existingSecret) }}
{{- if $isChartManaged }}
{{- /* Helm hook Job that creates the Redis password Secret if it doesn't exist (ArgoCD-safe). */}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "knodex.fullname" . }}-redis-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "knodex.fullname" . }}-redis-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "knodex.fullname" . }}-redis-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "knodex.fullname" . }}-redis-secret-init
subjects:
  - kind: ServiceAccount
    name: {{ include "knodex.fullname" . }}-redis-secret-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "knodex.fullname" . }}-redis-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "knodex.labels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "knodex.fullname" . }}-redis-secret-init
      restartPolicy: OnFailure
      containers:
        - name: redis-secret-init
          image: "bitnami/kubectl:latest"
          command:
            - sh
            - -c
            - |
              SECRET_NAME="{{ include "knodex.redisSecretName" . }}"
              SECRET_KEY="redis-password"

              echo "Checking for existing Redis password secret ${SECRET_NAME}..."
              if kubectl get secret "${SECRET_NAME}" -n "{{ .Release.Namespace }}" >/dev/null 2>&1; then
                echo "Secret ${SECRET_NAME} already exists. Skipping creation."
                # Verify the key exists
                if kubectl get secret "${SECRET_NAME}" -n "{{ .Release.Namespace }}" -o jsonpath="{.data.${SECRET_KEY}}" | grep -q .; then
                  echo "Password key '${SECRET_KEY}' is present. Done."
                  exit 0
                else
                  echo "WARNING: Secret exists but key '${SECRET_KEY}' is missing or empty."
                  exit 1
                fi
              fi

              echo "Secret ${SECRET_NAME} not found. Creating..."
              {{- if .Values.redis.auth.password }}
              PASSWORD="{{ .Values.redis.auth.password }}"
              {{- else }}
              PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
              {{- end }}

              kubectl create secret generic "${SECRET_NAME}" \
                -n "{{ .Release.Namespace }}" \
                --from-literal="${SECRET_KEY}=${PASSWORD}"

              # Label the secret for identification
              kubectl label secret "${SECRET_NAME}" \
                -n "{{ .Release.Namespace }}" \
                app.kubernetes.io/managed-by=Helm \
                app.kubernetes.io/part-of=knodex

              echo "Redis password secret ${SECRET_NAME} created successfully."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
{{- end }}
