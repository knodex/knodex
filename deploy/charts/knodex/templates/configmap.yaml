apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knodex.fullname" . }}-config
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
data:
  # Server configuration
  SERVER_ADDRESS: {{ .Values.server.config.serverAddress | quote }}
  LOG_LEVEL: {{ .Values.server.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.server.config.logFormat | quote }}
  REDIS_ADDRESS: "{{ include "knodex.redisHost" . }}:{{ include "knodex.redisPort" . }}"
  KUBERNETES_IN_CLUSTER: "true"
  # OIDC Group Mappings (JSON array)
  {{- if .Values.server.auth.oidc.groupMappings }}
  OIDC_GROUP_MAPPINGS: {{ .Values.server.auth.oidc.groupMappings | toJson | quote }}
  {{- end }}
