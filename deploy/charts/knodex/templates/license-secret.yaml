{{- if not .Values.enterprise.license.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "knodex.fullname" . }}-license
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
# Enterprise license secret for Knodex
#
# To configure a license, choose one of:
#
# Option 1: Set enterprise.license.text in values.yaml (inline JWT)
# Option 2: Set enterprise.license.secretName to reference an existing secret
# Option 3: Create a secret manually:
#   kubectl create secret generic <release>-license \
#     --from-file=license.jwt=/path/to/license.jwt -n <namespace>
#
# The license is optional - OSS builds ignore it, and enterprise builds
# start without a license (features gated at runtime with 402 responses).
{{- if .Values.enterprise.license.text }}
data:
  license.jwt: {{ .Values.enterprise.license.text | b64enc }}
{{- else }}
data: {}
{{- end }}
{{- end }}
