{{- if .Values.enterprise.gatekeeper.enabled }}
# RBAC permissions for OPA Gatekeeper compliance features (Enterprise)
# This ClusterRole grants the knodex service account access to:
# - ConstraintTemplates (read-only)
# - Constraints (read + update for enforcement action management)
# - Constraint/Template pod statuses (read-only)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "knodex.fullname" . }}-gatekeeper-reader
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
    app.kubernetes.io/component: gatekeeper-integration
rules:
  # ConstraintTemplates - read-only access
  - apiGroups:
      - templates.gatekeeper.sh
    resources:
      - constrainttemplates
    verbs:
      - get
      - list
      - watch
  # Constraints - read + update (for enforcement action management)
  - apiGroups:
      - constraints.gatekeeper.sh
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Constraint/Template pod statuses - read-only
  - apiGroups:
      - status.gatekeeper.sh
    resources:
      - constraintpodstatuses
      - constrainttemplatepodstatuses
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "knodex.fullname" . }}-gatekeeper-reader
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
    app.kubernetes.io/component: gatekeeper-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "knodex.fullname" . }}-gatekeeper-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "knodex.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
