{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "knodex.fullname" . }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
rules:
  # Read ResourceGraphDefinitions
  - apiGroups: ["kro.run"]
    resources: ["resourcegraphdefinitions"]
    verbs: ["get", "list", "watch"]
  # Read CRDs to extract schemas and install RBAC CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update"]
  # Manage namespaces for organization creation and namespace selector
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Manage RBAC resources (Projects CRD)
  # Note: Users and RepositoryConfigs follow ArgoCD pattern - stored in Secrets, not CRDs
  - apiGroups: ["knodex.io"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["knodex.io"]
    resources: ["projects/status"]
    verbs: ["get", "update", "patch"]
  # Manage instances (CRs created by Kro)
  # Note: This is a catch-all for any CRD in kro.run group
  - apiGroups: ["kro.run"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Manage ConfigMaps and Secrets for auth (account storage) and child resources view
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read child resources for managed resources view
  - apiGroups: [""]
    resources: ["services", "pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # API discovery for listing available API groups and resources
  # Required for the searchable API group/kind selectors
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Read-only access to all resources for API discovery
  # The discovery client needs to enumerate available resource types
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "knodex.fullname" . }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "knodex.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "knodex.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped Role for admin password secret creation and repository management
# This allows the server to create and read the knodex-initial-admin-password secret
# and manage repository secrets (ArgoCD-style pattern)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "knodex.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
rules:
  # Allow creating and reading the admin password secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get"]
    resourceNames: ["knodex-initial-admin-password"]
  # Allow full management of repository secrets (ArgoCD-style pattern)
  # Required for creating, updating, listing, and deleting repository secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "knodex.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "knodex.fullname" . }}-secret-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "knodex.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
