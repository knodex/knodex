{{- if and .Values.server.auth.oidc.enabled .Values.server.auth.oidc.providers }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: knodex-sso-providers
  labels:
    {{- include "knodex.labels" . | nindent 4 }}
    app.kubernetes.io/component: sso
    knodex.io/config-type: sso
data:
  providers.json: |
    [
      {{- range $i, $provider := .Values.server.auth.oidc.providers }}
      {{- if $i }},{{ end }}
      {
        "name": {{ $provider.name | quote }},
        "issuerURL": {{ $provider.issuerURL | quote }},
        "redirectURL": {{ $provider.redirectURL | quote }},
        "scopes": {{ $provider.scopes | default (list "openid" "email" "profile") | toJson }}
        {{- if $provider.tokenEndpointAuthMethod }},
        "tokenEndpointAuthMethod": {{ $provider.tokenEndpointAuthMethod | quote }}
        {{- end }}
        {{- if $provider.authorizationURL }},
        "authorizationURL": {{ $provider.authorizationURL | quote }}
        {{- end }}
        {{- if $provider.tokenURL }},
        "tokenURL": {{ $provider.tokenURL | quote }}
        {{- end }}
        {{- if $provider.jwksURL }},
        "jwksURL": {{ $provider.jwksURL | quote }}
        {{- end }}
      }
      {{- end }}
    ]
{{- end }}
