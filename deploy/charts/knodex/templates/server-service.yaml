apiVersion: v1
kind: Service
metadata:
  name: {{ include "knodex.fullname" . }}-server
  labels:
    {{- include "knodex.server.labels" . | nindent 4 }}
  {{- with .Values.server.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "knodex.server.selectorLabels" . | nindent 4 }}
