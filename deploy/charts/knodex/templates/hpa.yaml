{{- if .Values.server.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "knodex.fullname" . }}-server
  labels:
    {{- include "knodex.server.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "knodex.fullname" . }}-server
  minReplicas: {{ .Values.server.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.server.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.server.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.server.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.server.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.server.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.server.autoscaling.behavior.scaleDown.stabilizationWindowSeconds | default 300 }}
      policies:
        - type: Percent
          value: {{ .Values.server.autoscaling.behavior.scaleDown.percentValue | default 25 }}
          periodSeconds: {{ .Values.server.autoscaling.behavior.scaleDown.periodSeconds | default 60 }}
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.server.autoscaling.behavior.scaleUp.stabilizationWindowSeconds | default 0 }}
      policies:
        - type: Percent
          value: {{ .Values.server.autoscaling.behavior.scaleUp.percentValue | default 100 }}
          periodSeconds: {{ .Values.server.autoscaling.behavior.scaleUp.periodSeconds | default 15 }}
        - type: Pods
          value: {{ .Values.server.autoscaling.behavior.scaleUp.podsValue | default 2 }}
          periodSeconds: {{ .Values.server.autoscaling.behavior.scaleUp.periodSeconds | default 15 }}
      selectPolicy: Max
{{- end }}
