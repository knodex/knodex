apiVersion: apps/v1
kind: Deployment
metadata:
  name: knodex-redis
  labels:
    app.kubernetes.io/name: knodex
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knodex
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knodex
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 0
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          # Same Bitnami Redis image used in the Helm chart (pinned by digest).
          # To update: docker pull bitnami/redis:latest && docker inspect --format='{{index .RepoDigests 0}}' bitnami/redis:latest
          image: bitnami/redis@sha256:5179ef5fcc0aee9b3a16e8030ea7b1a81f94033c06e1676c0c4b18c237de2e82
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: redis-data
              mountPath: /bitnami/redis/data
            - name: redis-tmp
              mountPath: /opt/bitnami/redis/tmp
            - name: redis-logs
              mountPath: /opt/bitnami/redis/logs
            - name: redis-etc
              mountPath: /opt/bitnami/redis/etc
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          emptyDir: {}
        - name: redis-tmp
          emptyDir: {}
        - name: redis-logs
          emptyDir: {}
        - name: redis-etc
          emptyDir: {}
        - name: tmp
          emptyDir: {}
