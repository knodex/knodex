# Example RGD: CEL Conditions Test
# Demonstrates: Template conditional resources with affectedProperties propagation
#
# Test matrix:
#   Field              | Used By                    | Expected Behavior
#   -------------------|----------------------------|------------------------------------------
#   name               | app (non-cond) + cache     | Always visible (in non-conditional)
#   image              | app (non-cond)             | Always visible
#   port               | app (non-cond)             | Always visible
#   sharedLabel        | database + cache ONLY      | Hidden when BOTH features disabled (AND)
#   database.enabled   | Controlling field           | Always visible (controller parent)
#   database.name      | database ONLY              | Visible when database.enabled=true
#   cache.enabled      | Controlling field           | Always visible (controller parent)
#   cache.maxMemory    | cache ONLY                 | Visible when cache.enabled=true
#   advanced.*         | app (non-cond)             | Advanced section (hidden behind toggle)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: cel-conditions-test
  annotations:
    knodex.io/catalog: "true"
    knodex.io/title: "CEL Conditions Test App"
    knodex.io/description: "Test application with conditional template resources for affectedProperties verification"
    knodex.io/tags: "test,cel,conditions,conditional"
    knodex.io/category: "examples"
spec:
  schema:
    apiVersion: v1alpha1
    kind: CELTestApp
    spec:
      name: string
      image: string | default="nginx:latest"
      port: integer | default=80
      # Shared field used ONLY by conditional resources (AND-based hiding test)
      sharedLabel: string | default=""
      database:
        enabled: boolean | default=false
        name: string | default="mydb"
      cache:
        enabled: boolean | default=false
        maxMemory: string | default="256mb"
      advanced:
        replicas: integer | default=1
        enableMonitoring: boolean | default=false

  resources:
    # Always-present Deployment — uses name, image, port, advanced.*
    - id: app
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.advanced.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.port}

    # Conditional database — uses database.name, sharedLabel
    - id: database
      includeWhen:
        - ${schema.spec.database.enabled == true}
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: ${schema.spec.name}-db
          labels:
            shared: ${schema.spec.sharedLabel}
        spec:
          serviceName: ${schema.spec.name}-db
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.spec.name}
              component: database
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
                component: database
            spec:
              containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                    - name: POSTGRES_DB
                      value: ${schema.spec.database.name}
                  ports:
                    - containerPort: 5432

    # Conditional cache — uses name, sharedLabel
    - id: cache
      includeWhen:
        - ${schema.spec.cache.enabled == true}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}-cache
          labels:
            shared: ${schema.spec.sharedLabel}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.spec.name}
              component: cache
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
                component: cache
            spec:
              containers:
                - name: redis
                  image: redis:7-alpine
                  args:
                    - redis-server
                    - --maxmemory
                    - ${schema.spec.cache.maxMemory}
                  ports:
                    - containerPort: 6379

    # Conditional monitoring (nested advanced field)
    - id: monitoring
      includeWhen:
        - ${schema.spec.advanced.enableMonitoring}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-monitoring
          labels:
            app: ${schema.spec.name}
        data:
          prometheus.yml: |
            scrape_configs:
              - job_name: app
                static_configs:
                  - targets: ['localhost:9090']
