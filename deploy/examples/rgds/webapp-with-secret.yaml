# Example RGD: Web App with Secret
# Demonstrates: externalRef with kind: Secret for SecretsTab in deploy flow
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: webapp-with-secret
  namespace: default
  annotations:
    knodex.io/catalog: "true"
    knodex.io/description: "Web application that references an external Kubernetes Secret for database credentials"
    knodex.io/tags: "webapp,secret,database,example"
    knodex.io/category: "examples"
spec:
  schema:
    apiVersion: v1alpha1
    kind: WebAppWithSecret
    spec:
      appName: string | default="my-webapp" description="Application name"
      image: string | default="nginx:latest" description="Container image"
      port: integer | default=80 description="Container port"
      externalRef:
        dbSecret:
          name: string | default="" description="Name of the Kubernetes Secret containing database credentials"
          namespace: string | default="" description="Namespace of the Secret"

  resources:
    # External Secret reference — triggers SecretsTab in deploy UI
    - id: dbSecret
      externalRef:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.externalRef.dbSecret.name}
          namespace: ${schema.spec.externalRef.dbSecret.namespace}

    # Deployment that uses the secret
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.appName}
          labels:
            app: ${schema.spec.appName}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.spec.appName}
          template:
            metadata:
              labels:
                app: ${schema.spec.appName}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.port}
                  envFrom:
                    - secretRef:
                        name: ${dbSecret.metadata.name}

    # Service
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.appName}
        spec:
          selector:
            app: ${schema.spec.appName}
          ports:
            - port: ${schema.spec.port}
              targetPort: ${schema.spec.port}
