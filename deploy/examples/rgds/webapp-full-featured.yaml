# Example RGD: Full-Featured Web Application
# Demonstrates all form field patterns:
#
#   Pattern                    | Example                          | UI Behavior
#   ---------------------------|----------------------------------|-------------------------------
#   Always-visible field       | name, image, port                | Always shown at top level
#   Global advanced            | advanced.logLevel, advanced.cors | Hidden behind global toggle
#   Per-feature enabled toggle | database.enabled, cache.enabled  | Controls includeWhen resources
#   Per-feature always-visible | database.name, cache.maxMemory   | Always shown inside feature
#   Per-feature advanced       | database.advanced.*, cache.adv.* | Hidden behind inline toggle
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: webapp-full-featured
  annotations:
    knodex.io/catalog: "true"
    knodex.io/deployment-modes: "direct,gitops"
    knodex.io/title: "Full-Featured Web App"
    knodex.io/description: "Full-featured web application with database, cache, and multi-level advanced configuration"
    knodex.io/tags: "webapp,fullstack,conditions,per-feature"
    knodex.io/category: "applications"
    knodex.io/docs-url: "https://docs.example.com/webapp"
    knodex.io/property-order: '{"": ["name", "image", "port", "database", "cache", "advanced"], "database": ["enabled", "name", "advanced"], "cache": ["enabled", "maxMemory", "advanced"]}'
spec:
  schema:
    apiVersion: v1alpha1
    kind: WebApp
    spec:
      # ── Always-visible top-level fields ──
      name: string
      image: string | default="nginx:latest"
      port: integer | default=8080

      # ── Per-feature: Database ──
      # database.enabled     → controls includeWhen (creates/skips DB resources)
      # database.name        → always visible inside the database section
      # database.advanced.*  → hidden behind per-feature advanced toggle
      database:
        enabled: boolean | default=false
        name: string | default="mydb"
        advanced:
          storageClass: string | default="standard"
          storageSize: string | default="10Gi"
          maxConnections: string | default="100"

      # ── Per-feature: Cache ──
      cache:
        enabled: boolean | default=false
        maxMemory: string | default="256mb"
        advanced:
          evictionPolicy: string | default="allkeys-lru"
          persistenceEnabled: boolean | default=false
          snapshotInterval: string | default="3600"

      # ── Global advanced (top-level) ──
      # Hidden behind the global "Show Advanced Configuration" toggle
      advanced:
        replicas: integer | default=2
        resources:
          limits:
            cpu: string | default="500m"
            memory: string | default="512Mi"
        healthCheck:
          enabled: boolean | default=true
          path: string | default="/health"
          interval: integer | default=30
        logLevel: string | default="info"
        cors:
          allowOrigins: string | default="*"
          allowMethods: string | default="GET,POST,PUT,DELETE"

  resources:
    # ── Main application (always included) ──
    - id: app
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.advanced.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.port}
                  env:
                    - name: LOG_LEVEL
                      value: ${schema.spec.advanced.logLevel}
                    - name: CORS_ORIGINS
                      value: ${schema.spec.advanced.cors.allowOrigins}
                    - name: CORS_METHODS
                      value: ${schema.spec.advanced.cors.allowMethods}
                  resources:
                    limits:
                      cpu: ${schema.spec.advanced.resources.limits.cpu}
                      memory: ${schema.spec.advanced.resources.limits.memory}
                  livenessProbe:
                    httpGet:
                      path: ${schema.spec.advanced.healthCheck.path}
                      port: ${schema.spec.port}
                    periodSeconds: ${schema.spec.advanced.healthCheck.interval}

    - id: appSvc
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
        spec:
          selector:
            app: ${schema.spec.name}
          ports:
            - port: 80
              targetPort: ${schema.spec.port}

    # ── Database (conditional on database.enabled) ──
    - id: database
      includeWhen:
        - ${schema.spec.database.enabled == true}
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: ${schema.spec.name}-db
        spec:
          serviceName: ${schema.spec.name}-db
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.spec.name}
              component: database
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
                component: database
            spec:
              containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                    - name: POSTGRES_DB
                      value: ${schema.spec.database.name}
                    - name: POSTGRES_MAX_CONNECTIONS
                      value: "${schema.spec.database.advanced.maxConnections}"
                  ports:
                    - containerPort: 5432
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/postgresql/data
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                storageClassName: ${schema.spec.database.advanced.storageClass}
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: ${schema.spec.database.advanced.storageSize}

    - id: databaseSvc
      includeWhen:
        - ${schema.spec.database.enabled == true}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-db
        spec:
          selector:
            app: ${schema.spec.name}
            component: database
          ports:
            - port: 5432
              targetPort: 5432

    # ── Cache (conditional on cache.enabled) ──
    - id: cache
      includeWhen:
        - ${schema.spec.cache.enabled == true}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}-cache
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.spec.name}
              component: cache
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
                component: cache
            spec:
              containers:
                - name: redis
                  image: redis:7-alpine
                  args:
                    - redis-server
                    - --maxmemory
                    - ${schema.spec.cache.maxMemory}
                    - --maxmemory-policy
                    - ${schema.spec.cache.advanced.evictionPolicy}
                    - --save
                    - "${schema.spec.cache.advanced.snapshotInterval}"
                    - "1"
                  ports:
                    - containerPort: 6379

    - id: cacheSvc
      includeWhen:
        - ${schema.spec.cache.enabled == true}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-cache
        spec:
          selector:
            app: ${schema.spec.name}
            component: cache
          ports:
            - port: 6379
              targetPort: 6379
