# Reference RGD: Conditional Resources
# kro-feature: conditional-resources
# kro-min-version: v0.8.0
# knodex-support: true
#
# Tests: includeWhen with boolean conditions.
# Validates that Knodex correctly identifies conditional vs unconditional
# resources and tracks which fields are used by conditional resources.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: ref-conditional-resources
  annotations:
    knodex.io/canary: "true"
    knodex.io/kro-feature: "conditional-resources"
    knodex.io/kro-min-version: "v0.8.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: ConditionalTest
    spec:
      name: string
      enableFeatureA: boolean | default=false
      enableFeatureB: boolean | default=false
      featureAConfig:
        replicas: integer | default=1

  resources:
    # Always-present resource
    - id: base
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-base
          labels:
            app: ${schema.spec.name}
        data:
          name: ${schema.spec.name}

    # Conditional on enableFeatureA
    - id: featureA
      includeWhen:
        - ${schema.spec.enableFeatureA == true}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-feature-a
          labels:
            app: ${schema.spec.name}
            feature: a
        data:
          replicas: "${schema.spec.featureAConfig.replicas}"

    # Conditional on enableFeatureB
    - id: featureB
      includeWhen:
        - ${schema.spec.enableFeatureB == true}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-feature-b
          labels:
            app: ${schema.spec.name}
            feature: b
        data:
          enabled: "true"
