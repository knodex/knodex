# Reference RGD: Advanced Section
# kro-feature: advanced-section
# kro-min-version: v0.8.0
# knodex-support: true
#
# Tests: spec.advanced fields with nested objects.
# Validates that Knodex correctly extracts and presents advanced/nested
# configuration sections within the schema.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: ref-advanced-section
  annotations:
    knodex.io/canary: "true"
    knodex.io/kro-feature: "advanced-section"
    knodex.io/kro-min-version: "v0.8.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AdvancedSectionTest
    spec:
      name: string
      advanced:
        replicas: integer | default=1
        enableDebug: boolean | default=false
        resources:
          limits:
            cpu: string | default="500m"
            memory: string | default="256Mi"
          requests:
            cpu: string | default="100m"
            memory: string | default="128Mi"
        healthCheck:
          enabled: boolean | default=true
          path: string | default="/healthz"
          intervalSeconds: integer | default=30

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          labels:
            app: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.advanced.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: nginx:latest
                  resources:
                    limits:
                      cpu: ${schema.spec.advanced.resources.limits.cpu}
                      memory: ${schema.spec.advanced.resources.limits.memory}
                    requests:
                      cpu: ${schema.spec.advanced.resources.requests.cpu}
                      memory: ${schema.spec.advanced.resources.requests.memory}
