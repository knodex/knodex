# Reference RGD: CEL Expressions
# kro-feature: cel-expressions
# kro-min-version: v0.9.0
# knodex-support: true
#
# Tests: Various CEL expression patterns used in KRO templates.
# Validates that Knodex correctly parses CEL expressions including
# ternary operators, equality checks, and field references in conditions.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: ref-cel-expressions
  annotations:
    knodex.io/canary: "true"
    knodex.io/kro-feature: "cel-expressions"
    knodex.io/kro-min-version: "v0.9.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: CELExprTest
    spec:
      name: string
      environment: string | default="dev"
      enableHA: boolean | default=false
      enableMonitoring: boolean | default=false
      tier: string | default="standard"

  resources:
    # Resource using CEL ternary in template values
    - id: app
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          labels:
            app: ${schema.spec.name}
            env: ${schema.spec.environment}
        spec:
          replicas: "${schema.spec.enableHA ? 3 : 1}"
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: nginx:latest
                  resources:
                    limits:
                      cpu: "${schema.spec.tier == 'premium' ? '2000m' : '500m'}"
                      memory: "${schema.spec.tier == 'premium' ? '2Gi' : '512Mi'}"

    # Conditional on boolean equality
    - id: monitoring
      includeWhen:
        - ${schema.spec.enableMonitoring == true}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-monitoring
          labels:
            app: ${schema.spec.name}
        data:
          environment: ${schema.spec.environment}
          scrapeInterval: "${schema.spec.tier == 'premium' ? '15s' : '60s'}"

    # Conditional on string equality
    - id: prodConfig
      includeWhen:
        - ${schema.spec.environment == "production"}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-prod-config
          labels:
            app: ${schema.spec.name}
        data:
          ha: "${schema.spec.enableHA}"
          tier: ${schema.spec.tier}
