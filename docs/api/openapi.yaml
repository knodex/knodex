  # -------------------------------------------------------------------------
  # Account
  # -------------------------------------------------------------------------
  /api/v1/account/can-i/{resource}/{action}/{subresource}:
    get:
      summary: Check permission
      description: |
        ArgoCD-style permission check. Returns whether the current user
        can perform the given action on the given resource.
      tags: [account]
      operationId: canI
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: path
          required: true
          description: Resource type (e.g., projects, instances, settings)
          schema:
            type: string
        - name: action
          in: path
          required: true
          description: Action (e.g., get, create, update, delete)
          schema:
            type: string
        - name: subresource
          in: path
          required: true
          description: Subresource or object (e.g., project name, *)
          schema:
            type: string
      responses:
        '200':
          description: Permission check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: string
                    enum: ["yes", "no"]

  /api/v1/account/info:
    get:
      summary: Get current user info
      description: Returns identity and authorization details for the current user.
      tags: [account]
      operationId: accountInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoResponse'

