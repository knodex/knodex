          schema:
            type: string
            enum: [deny, dryrun, warn]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Constraint list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Constraint'
                  totalCount:
                    type: integer
    post:
      summary: Create constraint
      description: Creates a new OPA Gatekeeper constraint from a ConstraintTemplate.
      tags: [compliance]
      operationId: createConstraint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConstraintRequest'
      responses:
        '201':
          description: Constraint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constraint'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/compliance/constraints/{kind}/{name}:
    get:
      summary: Get constraint
      tags: [compliance]
      operationId: getConstraint
      security:
        - bearerAuth: []
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Constraint details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constraint'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/compliance/constraints/{kind}/{name}/enforcement:
    patch:
      summary: Update constraint enforcement
      description: Updates a constraint's enforcementAction field.
      tags: [compliance]
      operationId: updateConstraintEnforcement
      security:
        - bearerAuth: []
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enforcementAction]
              properties:
                enforcementAction:
                  type: string
                  enum: [deny, dryrun, warn]
      responses:
        '200':
          description: Enforcement updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constraint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/compliance/violations:
    get:
      summary: List violations
      description: Returns all OPA Gatekeeper violations across all constraints.
      tags: [compliance]
      operationId: listViolations
      security:
        - bearerAuth: []
      parameters:
        - name: constraintKind
          in: query
          schema:
            type: string
        - name: constraintName
          in: query
          schema:
            type: string
        - name: resourceKind
          in: query
          schema:
            type: string
        - name: resourceNamespace
          in: query
          schema:
            type: string
        - name: resourceName
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Violation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Violation'
                  totalCount:
                    type: integer

  /api/v1/compliance/violations/history:
    get:
      summary: List violation history
      description: Returns historical violation snapshots over time.
      tags: [compliance]
      operationId: listViolationHistory
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Violation history
          content:
            application/json:
              schema:
                type: object

  /api/v1/compliance/violations/history/count:
    get:
      summary: Count violation history entries
      tags: [compliance]
      operationId: countViolationHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/v1/compliance/violations/history/export:
    get:
      summary: Export violation history
      description: Exports violation history in CSV format.
      tags: [compliance]
      operationId: exportViolationHistory
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema:
                type: string

  # -------------------------------------------------------------------------
  # Custom Views (Enterprise)
  # -------------------------------------------------------------------------
  /api/v1/ee/views:
    get:
      summary: List custom views
      description: Returns custom category views. Enterprise feature.
      tags: [views]
      operationId: listViews
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Views list
          content:
            application/json:
              schema:
                type: object
                properties:
                  views:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomView'

  /api/v1/ee/views/{slug}:
    get:
      summary: Get custom view
      tags: [views]
      operationId: getView
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: View details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomView'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # Audit Trail (Enterprise)
  # -------------------------------------------------------------------------
  /api/v1/settings/audit/events:
    get:
      summary: List audit events
      description: Returns paginated audit events. Requires `settings/audit:get` permission.
      tags: [audit]
      operationId: listAuditEvents
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: from
          in: query
          description: Start time (RFC3339)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End time (RFC3339)
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventList'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/settings/audit/events/{id}:
    get:
      summary: Get audit event
      tags: [audit]
      operationId: getAuditEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Audit event ULID
          schema:
            type: string
      responses:
        '200':
          description: Audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/settings/audit/stats:
    get:
      summary: Get audit statistics
      description: Returns aggregate audit statistics (total events, events today, top users).
      tags: [audit]
      operationId: getAuditStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Audit stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStats'

  /api/v1/settings/audit/config:
    get:
      summary: Get audit configuration
      tags: [audit]
      operationId: getAuditConfig
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Audit config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditConfig'
    put:
      summary: Update audit configuration
      description: Updates audit trail settings. Requires `settings/audit:update` permission.
      tags: [audit]
      operationId: updateAuditConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditConfig'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Concurrent modification

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from local login or OIDC flow (HS256, 1hr expiry)

  # -------------------------------------------------------------------------
  # Reusable parameters
  # -------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    NamespaceQuery:
      name: namespace
      in: query
      description: Kubernetes namespace filter
      schema:
        type: string
    RGDName:
      name: name
      in: path
      required: true
      description: RGD resource name
      schema:
        type: string
    ProjectName:
      name: name
      in: path
      required: true
      description: Project name
      schema:
        type: string
    RoleName:
      name: role
      in: path
      required: true
      description: Role name (e.g., admin, developer, readonly)
      schema:
        type: string
    RepoId:
      name: repoId
      in: path
      required: true
      description: Repository configuration ID
      schema:
        type: string
    InstanceNamespace:
      name: namespace
      in: path
      required: true
      description: Instance namespace
      schema:
        type: string
    InstanceKind:
      name: kind
      in: path
      required: true
      description: Instance kind (e.g., PostgresCluster)
      schema:
        type: string
    InstanceName:
      name: name
      in: path
      required: true
      description: Instance name
      schema:
        type: string

  # -------------------------------------------------------------------------
  # Reusable responses
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: missing Authorization header
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: permission denied
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:
    # --- Common ---
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - SERVICE_UNAVAILABLE
            - INTERNAL_ERROR
            - VALIDATION_FAILED
            - RATE_LIMIT_EXCEEDED
            - METHOD_NOT_ALLOWED
            - CONFLICT
            - DEPLOYMENT_MODE_NOT_ALLOWED
            - GITOPS_ERROR
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context (field-level errors, etc.)

    # --- Health ---
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        components:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [healthy, degraded, unhealthy]
              message:
                type: string

    # --- Auth ---
    LocalLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            displayName:
              type: string
        token:
          type: string
          description: JWT Bearer token (HS256, 1hr expiry)

    OIDCProvider:
      type: object
      properties:
        name:
          type: string
        displayName:
          type: string

    # --- RGD Catalog ---
    RGDResponse:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        description:
          type: string
        version:
          type: string
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        icon:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        instances:
          type: integer
        apiVersion:
          type: string
        kind:
          type: string
        allowedDeploymentModes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListRGDsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RGDResponse'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ResourceGraphResponse:
      type: object
      properties:
        rgdName:
          type: string
        rgdNamespace:
          type: string
        resources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              apiVersion:
                type: string
              kind:
                type: string
              isTemplate:
                type: boolean
              isConditional:
                type: boolean
              conditionExpr:
                type: string
              dependsOn:
                type: array
                items:
                  type: string
              externalRef:
                type: object
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  nameExpr:
                    type: string
                  namespaceExpr:
                    type: string
                  usesSchemaSpec:
                    type: boolean
                  schemaField:
                    type: string
        edges:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              type:
                type: string

    SchemaResponse:
      type: object
      properties:
        rgd:
          type: string
        crdFound:
          type: boolean
        schema:
          type: object
          description: JSON Schema for the CRD spec
        error:
          type: string

    # --- Instances ---
    ListInstancesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InstanceDetail'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    InstanceDetail:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        kind:
          type: string
        apiVersion:
          type: string
        rgdName:
          type: string
        status:
          type: string
        health:
          type: string
        deploymentMode:
          type: string
        conditions:
          type: array
          items:
            type: object
        spec:
          type: object
        createdAt:
          type: string
          format: date-time

    UpdateInstanceRequest:
      type: object
      properties:
        spec:
          type: object
          description: Updated spec values
        resourceVersion:
          type: string
          description: Resource version for optimistic concurrency control
        repositoryId:
          type: string
          description: Git repository config ID (required for gitops/hybrid mode updates)
        gitBranch:
          type: string
          description: Override the repository's default branch for this update
        gitPath:
          type: string
          description: Override the auto-generated semantic path for this update

    CreateInstanceRequest:
      type: object
      required: [name, namespace, rgdName]
      properties:
        name:
          type: string
          description: DNS-1123 compliant instance name
        namespace:
          type: string
        projectId:
          type: string
        rgdName:
          type: string
        rgdNamespace:
          type: string
        spec:
          type: object
          description: Instance spec values
        deploymentMode:
          type: string
          enum: [direct, gitops, hybrid]
          default: direct
        repositoryId:
          type: string
          description: Required for gitops/hybrid modes
        gitBranch:
          type: string
        gitPath:
          type: string

    CreateInstanceResponse:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        rgdName:
          type: string
        apiGroup:
          type: string
        kind:
          type: string
        version:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        deploymentMode:
          type: string
        gitInfo:
          type: object
          properties:
            commitSha:
              type: string
            path:
              type: string
            pushStatus:
              type: string

    PendingInstance:
      type: object
      properties:
        instanceId:
          type: string
        name:
          type: string
        namespace:
          type: string
        rgdName:
          type: string
        deploymentMode:
          type: string
        status:
          type: string
        pushedAt:
          type: string
          format: date-time
        commitSha:
          type: string
        isStuck:
          type: boolean

    # --- Projects ---
    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectResponse'
        totalCount:
          type: integer

    ProjectResponse:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        destinations:
          type: array
          items:
            type: object
            properties:
              namespace:
                type: string
              server:
                type: string
        roles:
          type: array
          items:
            type: object
        resourceVersion:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        destinations:
          type: array
          items:
            type: object
            properties:
              namespace:
                type: string
              server:
                type: string

    UpdateProjectRequest:
      type: object
      required: [resourceVersion]
      properties:
        description:
          type: string
        destinations:
          type: array
          items:
            type: object
            properties:
              namespace:
                type: string
              server:
                type: string
        roles:
          type: array
          items:
            type: object
        resourceVersion:
          type: string
          description: Required for optimistic concurrency

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # --- Role Bindings ---
    RoleBindingResponse:
      type: object
      properties:
        project:
          type: string
        role:
          type: string
        subject:
          type: string
        type:
          type: string
          enum: [user, group]

    ListRoleBindingsResponse:
      type: object
      properties:
        project:
          type: string
        bindings:
          type: array
          items:
            $ref: '#/components/schemas/RoleBindingResponse'

    # --- Account ---
    AccountInfoResponse:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        groups:
          type: array
          items:
            type: string
        casbinRoles:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            type: string
        roles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        issuer:
          type: string
        tokenExpiresAt:
          type: string
          format: date-time
        tokenIssuedAt:
          type: string
          format: date-time

    # --- Namespaces ---
    NamespaceListResponse:
      type: object
      properties:
        namespaces:
          type: array
          items:
            type: string
        count:
          type: integer

    # --- Settings ---
    SettingsResponse:
      type: object
      properties:
        organization:
          type: string

    # --- SSO ---
    SSOProviderResponse:
      type: object
      properties:
        name:
          type: string
        issuerURL:
          type: string
        clientID:
          type: string
        redirectURL:
          type: string
        scopes:
          type: array
          items:
            type: string

    SSOProviderRequest:
      type: object
      required: [name, issuerURL, clientID, clientSecret]
      properties:
        name:
          type: string
        issuerURL:
          type: string
        clientID:
          type: string
        clientSecret:
          type: string
          format: password
        redirectURL:
          type: string
        scopes:
          type: array
          items:
            type: string

    # --- Repositories ---
    RepositoryConfigInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectId:
          type: string
        repoURL:
          type: string
        authType:
          type: string
          enum: [https, ssh, github-app]
        defaultBranch:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateRepositoryRequest:
      type: object
      required: [name, projectId, repoURL, authType]
      properties:
        name:
          type: string
        projectId:
          type: string
        repoURL:
          type: string
        authType:
          type: string
          enum: [https, ssh, github-app]
        defaultBranch:
          type: string
          default: main
        enabled:
          type: boolean
          default: true
        sshAuth:
          type: object
          properties:
            privateKey:
              type: string
              format: password
        httpsAuth:
          type: object
          properties:
            username:
              type: string
            password:
              type: string
              format: password
            bearerToken:
              type: string
              format: password
        githubAppAuth:
          type: object
          properties:
            appId:
              type: string
            installationId:
              type: string
            privateKey:
              type: string
              format: password

    UpdateRepositoryRequest:
      type: object
      properties:
        name:
          type: string
        repoURL:
          type: string
        authType:
          type: string
        defaultBranch:
          type: string
        enabled:
          type: boolean

    TestConnectionRequest:
      type: object
      required: [repoURL, authType]
      properties:
        repoURL:
          type: string
        authType:
          type: string

    TestConnectionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        defaultBranch:
          type: string

    # --- License ---
    LicenseStatus:
      type: object
      properties:
        licensed:
          type: boolean
        enterprise:
          type: boolean
        status:
          type: string
        message:
          type: string

    # --- Compliance ---
    ComplianceStatus:
      type: object
      properties:
        available:
          type: boolean
        enterprise:
          type: boolean
        message:
          type: string
        gatekeeper:
          type: object

    ComplianceSummary:
      type: object
      properties:
        totalTemplates:
          type: integer
        totalConstraints:
          type: integer
        totalViolations:
          type: integer
        byEnforcement:
          type: object
          additionalProperties:
            type: integer

    ConstraintTemplate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        kind:
          type: string
        parameters:
          type: object
        constraintCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Constraint:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        templateName:
          type: string
        enforcementAction:
          type: string
          enum: [deny, dryrun, warn]
        violationCount:
          type: integer
        match:
          type: object
        parameters:
          type: object
        createdAt:
          type: string
          format: date-time

    CreateConstraintRequest:
      type: object
      required: [name, templateName]
      properties:
        name:
          type: string
        templateName:
          type: string
        enforcementAction:
          type: string
          enum: [deny, dryrun, warn]
          default: dryrun
        parameters:
          type: object
        match:
          type: object
          properties:
            namespaces:
              type: array
              items:
                type: string
            scope:
              type: string
            kinds:
              type: array
              items:
                type: object
                properties:
                  apiGroups:
                    type: array
                    items:
                      type: string
                  kinds:
                    type: array
                    items:
                      type: string
        labels:
          type: object
          additionalProperties:
            type: string

    Violation:
      type: object
      properties:
        constraintKind:
          type: string
        constraintName:
          type: string
        enforcementAction:
          type: string
        message:
          type: string
        resourceKind:
          type: string
        resourceNamespace:
          type: string
        resourceName:
          type: string
        resourceApiVersion:
          type: string

    # --- Audit ---
    AuditEventList:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          description: ULID identifier
        timestamp:
          type: string
          format: date-time
        userId:
          type: string
        userEmail:
          type: string
        sourceIP:
          type: string
        action:
          type: string
        resource:
          type: string
        name:
          type: string
        project:
          type: string
        namespace:
          type: string
        requestId:
          type: string
        result:
          type: string
          enum: [success, denied, error]
        details:
          type: object

    AuditStats:
      type: object
      properties:
        totalEvents:
          type: integer
        eventsToday:
          type: integer
        topUsers:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              count:
                type: integer
        deniedAttempts:
          type: integer
        byActionToday:
          type: object
          additionalProperties:
            type: integer
        byResultToday:
          type: object
          additionalProperties:
            type: integer

    AuditConfig:
      type: object
      properties:
        enabled:
          type: boolean
        retentionDays:
          type: integer
        maxStreamLength:
          type: integer
        excludeActions:
          type: array
          items:
            type: string
        excludeResources:
          type: array
          items:
            type: string

    # --- Views ---
    CustomView:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        filter:
          type: object

    # --- Kubernetes Resources ---
    K8sResourceListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        count:
          type: integer

    APIResourcesResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            type: object
            properties:
              apiGroup:
                type: string
              kind:
                type: string
        count:
          type: integer

    # --- RBAC Metrics ---
    RBACMetricsResponse:
      type: object
      properties:
        cache:
          type: object
        policy:
          type: object
        cacheManager:
          type: object

security:
  - bearerAuth: []
