      parameters:
        - $ref: '#/components/parameters/RepoId'
      responses:
        '200':
          description: Repository deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/repositories/test-connection:
    post:
