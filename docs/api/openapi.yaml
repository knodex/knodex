openapi: 3.0.3
info:
  title: Knodex API
  description: |
    REST API for Knodex — a Kubernetes Resource Orchestrator (KRO) visualization
    and management platform.

    Knodex provides a web interface for browsing RGD catalogs, deploying instances,
    managing projects and RBAC, and monitoring OPA Gatekeeper compliance.

    ## Authentication

    Most endpoints require a JWT Bearer token obtained via:
    - **Local login**: `POST /api/v1/auth/local/login` with username/password
    - **OIDC login**: Browser flow via `GET /api/v1/auth/oidc/login`

    Include the token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```

    Tokens expire after 1 hour (HS256). There is no refresh mechanism — re-authenticate
    after expiry.

    ## Enterprise Features

    Endpoints tagged **enterprise** require an enterprise license. In OSS builds they
    return `402 Payment Required` or `404 Not Found`.

    ## Rate Limiting

    Authentication endpoints are rate-limited per IP. Protected endpoints are
    rate-limited per authenticated user (default 100 req/min).
  version: 1.0.0
  contact:
    name: Provops
    url: https://github.com/knodex/knodex
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development server (Tilt)
  - url: http://knodex.knodex.svc.cluster.local:8080
    description: In-cluster service

tags:
  - name: health
    description: Health check endpoints for Kubernetes probes
  - name: auth
    description: Authentication (local login, OIDC, token exchange, logout)
  - name: rgds
    description: RGD (ResourceGraphDefinition) catalog operations
  - name: instances
    description: Instance deployment, listing, and lifecycle management
  - name: history
    description: Deployment history and timeline
  - name: projects
    description: Project CRUD and validation
  - name: role-bindings
    description: Project-scoped role assignment for users and groups
  - name: account
    description: Current user account info and permission checks
  - name: namespaces
    description: Kubernetes namespace listing
  - name: settings
    description: Platform-level settings (organization, SSO, audit)
  - name: repositories
    description: Git repository configuration for GitOps deployments
  - name: sso
    description: SSO/OIDC provider management
  - name: license
    description: Enterprise license status and management
  - name: compliance
    description: OPA Gatekeeper compliance (enterprise)
  - name: audit
    description: Audit trail events and configuration (enterprise)
  - name: views
    description: Custom category views (enterprise)
  - name: websocket
    description: WebSocket ticket and metrics
  - name: rbac-metrics
    description: RBAC policy and cache metrics
  - name: kubernetes
    description: Kubernetes resource and API discovery

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:
  # -------------------------------------------------------------------------
  # Health
  # -------------------------------------------------------------------------
  /healthz:
    get:
      summary: Liveness probe
      description: Returns healthy status if the service is running.
      tags: [health]
      operationId: healthz
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /readyz:
    get:
      summary: Readiness probe
      description: Returns healthy status if all components (Redis, Kubernetes, watchers) are ready.
      tags: [health]
      operationId: readyz
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # -------------------------------------------------------------------------
  # Authentication
  # -------------------------------------------------------------------------
  /api/v1/auth/local/login:
    post:
      summary: Local admin login
      description: |
        Authenticate with username and password. Returns a JWT token (HS256, 1hr expiry).
        Rate limited to 5 requests/minute per IP.
      tags: [auth]
      operationId: localLogin
      x-ratelimit-requests-per-minute: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalLoginRequest'
            example:
              username: admin
              password: my-secret-password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout
      description: Logs out the current user and records an audit event.
      tags: [auth]
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/token-exchange:
    post:
      summary: Exchange auth code for JWT
      description: |
        After OIDC callback, the frontend receives an opaque auth code via redirect.
        Exchange it for a JWT token. Rate limited to 5 requests/minute per IP.
      tags: [auth]
      operationId: tokenExchange
      x-ratelimit-requests-per-minute: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Opaque auth code from OIDC callback redirect
            example:
              code: abc123-opaque-code
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT Bearer token
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/oidc/login:
    get:
      summary: Initiate OIDC login
      description: |
        Redirects to the OIDC provider authorization endpoint.
        Rate limited to 20 requests/minute per IP.
      tags: [auth]
      operationId: oidcLogin
      x-ratelimit-requests-per-minute: 20
      parameters:
        - name: provider
          in: query
          description: OIDC provider name
          schema:
            type: string
          example: default
        - name: redirect
          in: query
          description: URL to redirect after successful auth
          schema:
            type: string
          example: http://localhost:5173
      responses:
        '302':
          description: Redirect to OIDC provider
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/oidc/callback:
    get:
      summary: OIDC callback
      description: |
        Handles the OIDC provider callback. Exchanges the authorization code,
        generates a JWT, stores an opaque auth code in Redis, and redirects
        the browser with the auth code. Rate limited to 5 requests/minute per IP.
      tags: [auth]
      operationId: oidcCallback
      x-ratelimit-requests-per-minute: 5
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code from OIDC provider
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: State parameter for CSRF protection
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with auth code
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/oidc/providers:
    get:
      summary: List OIDC providers
      description: |
        Returns available OIDC providers for the login page. Unauthenticated.
        Rate limited to 30 requests/minute per IP.
      tags: [auth]
      operationId: listOIDCProviders
      x-ratelimit-requests-per-minute: 30
      responses:
        '200':
          description: List of OIDC providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/OIDCProvider'

  # -------------------------------------------------------------------------
  # RGD Catalog
  # -------------------------------------------------------------------------
  /api/v1/rgds:
    get:
      summary: List catalog RGDs
      description: |
        Returns a paginated list of ResourceGraphDefinitions marked for catalog
        inclusion with the `knodex.io/catalog: "true"` annotation.
        Filtered by project visibility and organization.
      tags: [rgds]
      operationId: listRGDs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NamespaceQuery'
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: tags
          in: query
          description: Filter by tags (comma-separated, AND logic)
          schema:
            type: string
        - name: search
          in: query
          description: Search in name and description (case-insensitive)
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: sortBy
          in: query
          description: Sort field
          schema:
            type: string
            enum: [name, namespace, createdAt, updatedAt, category]
            default: name
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated list of RGDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRGDsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/rgds/count:
    get:
      summary: Get RGD count
      description: Returns the total count of catalog RGDs visible to the user.
      tags: [rgds]
      operationId: getRGDCount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: RGD count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 15

  /api/v1/rgds/filters:
    get:
      summary: Get available filter values
      description: Returns distinct categories, tags, and projects available for filtering. Categories are filtered by the user's Casbin authorization — only categories the user has `rgds/{category}/*` access to are included.
      tags: [rgds]
      operationId: getRGDFilters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Filter options
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: string
                  tags:
                    type: array
                    items:
                      type: string
                  namespaces:
                    type: array
                    items:
                      type: string

  /api/v1/rgds/{name}:
    get:
      summary: Get RGD by name
      description: Returns a single RGD. Searches across all namespaces if namespace is not specified.
      tags: [rgds]
      operationId: getRGD
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RGDName'
        - $ref: '#/components/parameters/NamespaceQuery'
      responses:
        '200':
          description: RGD details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RGDResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/rgds/{name}/resources:
    get:
      summary: Get RGD resource graph
      description: Returns the internal resource graph (templates and external refs) within an RGD.
      tags: [rgds]
      operationId: getRGDResourceGraph
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RGDName'
        - $ref: '#/components/parameters/NamespaceQuery'
      responses:
        '200':
          description: Resource graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceGraphResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/rgds/{name}/schema:
    get:
      summary: Get RGD form schema
      description: Returns the form schema extracted from the CRD for a specific RGD.
      tags: [rgds]
      operationId: getRGDSchema
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RGDName'
        - $ref: '#/components/parameters/NamespaceQuery'
      responses:
        '200':
          description: Schema response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/rgds/{name}/schema/invalidate:
    post:
      summary: Invalidate schema cache
      description: Invalidates the cached schema for a specific RGD. Requires `settings:update` permission.
      tags: [rgds]
      operationId: invalidateSchemaCache
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RGDName'
        - $ref: '#/components/parameters/NamespaceQuery'
      responses:
        '200':
          description: Cache invalidated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: schema cache invalidated
                  rgd:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # Instances
  # -------------------------------------------------------------------------
  /api/v1/instances:
    get:
      summary: List instances
      description: Returns a paginated list of deployed instances, filtered by project visibility.
      tags: [instances]
      operationId: listInstances
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NamespaceQuery'
        - name: rgdName
          in: query
          description: Filter by RGD name
          schema:
            type: string
        - name: health
          in: query
          description: Filter by health status
          schema:
            type: string
        - name: deploymentMode
          in: query
          description: Filter by deployment mode
          schema:
            type: string
            enum: [direct, gitops, hybrid]
        - name: projectId
          in: query
          description: Filter by project ID
          schema:
            type: string
        - name: search
          in: query
          description: Search by name
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated list of instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInstancesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/namespaces/{namespace}/instances/{kind}:
    post:
      summary: Deploy a new namespaced instance
      description: |
        Creates a new namespaced instance of an RGD. Supports direct, GitOps, and hybrid
        deployment modes. Protected by DeploymentValidator middleware that checks
        project existence, user deploy permission, and destination policies.
        Namespace is taken from the URL path. Kind must match the RGD's CRD Kind.
      tags: [instances]
      operationId: createNamespacedInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceRequest'
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInstanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Instance already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Deployment mode not allowed for this RGD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/instances/{kind}:
    post:
      summary: Deploy a new cluster-scoped instance
      description: |
        Creates a new cluster-scoped instance of an RGD. Supports direct, GitOps, and hybrid
        deployment modes. Protected by DeploymentValidator middleware that checks
        project existence, user deploy permission, and destination policies.
        Kind must match the RGD's CRD Kind. No namespace segment (cluster-scoped).
      tags: [instances]
      operationId: createClusterScopedInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceKind'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceRequest'
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInstanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Instance already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Deployment mode not allowed for this RGD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/instances/count:
    get:
      summary: Get instance count
      description: Returns the total count of instances visible to the user.
      tags: [instances]
      operationId: getInstanceCount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Instance count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/v1/instances/{kind}/{name}:
    get:
      summary: Get cluster-scoped instance details
      description: Returns details for a specific cluster-scoped instance (no namespace).
      tags: [instances]
      operationId: getClusterScopedInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a cluster-scoped instance
      description: Updates labels/annotations on a cluster-scoped instance.
      tags: [instances]
      operationId: updateClusterScopedInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstanceRequest'
      responses:
        '200':
          description: Instance updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a cluster-scoped instance
      description: Deletes a deployed cluster-scoped instance from the cluster.
      tags: [instances]
      operationId: deleteClusterScopedInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Instance deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  name:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/namespaces/{namespace}/instances/{kind}/{name}:
    get:
      summary: Get instance details
      description: Returns details for a specific instance.
      tags: [instances]
      operationId: getInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete an instance
      description: Deletes a deployed instance from the cluster.
      tags: [instances]
      operationId: deleteInstance
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Instance deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  name:
                    type: string
                  namespace:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/instances/pending:
    get:
      summary: List pending GitOps instances
      description: Returns instances awaiting cluster sync after GitOps push. Only available when GitOps monitoring is enabled.
      tags: [instances]
      operationId: getPendingInstances
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PendingInstance'
                  total:
                    type: integer
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/instances/stuck:
    get:
      summary: List stuck GitOps instances
      description: Returns instances stuck in PushedToGit state beyond the configured threshold.
      tags: [instances]
      operationId: getStuckInstances
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stuck instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PendingInstance'
                  total:
                    type: integer

  # -------------------------------------------------------------------------
  # Deployment History
  # -------------------------------------------------------------------------
  /api/v1/namespaces/{namespace}/instances/{kind}/{name}/history:
    get:
      summary: Get deployment history
      description: Returns the deployment history for an instance.
      tags: [history]
      operationId: getHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Deployment history
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/namespaces/{namespace}/instances/{kind}/{name}/history/export:
    get:
      summary: Export deployment history
      description: Exports deployment history in JSON or CSV format.
      tags: [history]
      operationId: exportHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
        - name: format
          in: query
          description: Export format
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Exported history
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string

  /api/v1/namespaces/{namespace}/instances/{kind}/{name}/timeline:
    get:
      summary: Get deployment timeline
      description: Returns a timeline view of deployment events for an instance.
      tags: [history]
      operationId: getTimeline
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceNamespace'
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Deployment timeline
          content:
            application/json:
              schema:
                type: object

  /api/v1/instances/{kind}/{name}/history:
    get:
      summary: Get cluster-scoped instance deployment history
      description: Returns the deployment history for a cluster-scoped instance.
      tags: [history]
      operationId: getClusterScopedHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/InstanceKind'
        - $ref: '#/components/parameters/InstanceName'
      responses:
        '200':
          description: Deployment history
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/instances/{kind}/{name}/history/export:
    get:
      summary: Export cluster-scoped instance deployment history
      description: Exports deployment history for a cluster-scoped instance in JSON or CSV format.
      tags: [history]
