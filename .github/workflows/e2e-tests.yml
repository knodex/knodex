name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - 'Dockerfile'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - 'Dockerfile'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs on new commits
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # E2E Tests with Kind Cluster (OSS)
  # Runs sequentially against multiple KRO versions
  # ============================================
  e2e:
    name: E2E Tests (KRO ${{ matrix.kro_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        kro_version: ['0.9.1']

    env:
      KIND_CLUSTER: knodex-e2e
      KRO_VERSION: ${{ matrix.kro_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Create Kind cluster
        run: |
          # Install Kind
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

          # Create cluster using CI config (no extraPortMappings)
          kind create cluster --name "$KIND_CLUSTER" --config scripts/kind-config-ci.yaml --wait 120s
          kubectl cluster-info --context "kind-$KIND_CLUSTER"
          kubectl config use-context "kind-$KIND_CLUSTER"

      - name: Install cluster prerequisites
        run: ./scripts/ensure-prereqs.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build OSS image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: knodex-server:local
          cache-from: type=gha,scope=e2e-oss
          cache-to: type=gha,mode=max,scope=e2e-oss,ignore-error=true

      - name: Build mock OIDC server
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: server
          file: server/test/mocks/oidc/Dockerfile
          load: true
          tags: mock-oidc:local
          cache-from: type=gha,scope=e2e-mock-oidc
          cache-to: type=gha,mode=max,scope=e2e-mock-oidc,ignore-error=true

      - name: Pre-pull Redis image
        run: |
          # Pull the same Bitnami Redis image used in deploy/redis (pinned by digest)
          docker pull bitnami/redis@sha256:5179ef5fcc0aee9b3a16e8030ea7b1a81f94033c06e1676c0c4b18c237de2e82

      - name: Load images into Kind
        run: |
          kind load docker-image knodex-server:local --name "$KIND_CLUSTER"
          kind load docker-image mock-oidc:local --name "$KIND_CLUSTER"
          kind load docker-image bitnami/redis@sha256:5179ef5fcc0aee9b3a16e8030ea7b1a81f94033c06e1676c0c4b18c237de2e82 --name "$KIND_CLUSTER"

      - name: Deploy application
        run: ./scripts/qa-deploy.sh deploy-only

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/knodex-server -n knodex

      - name: Port forward services
        run: |
          # Use port-forward with auto-restart wrapper
          (
            while true; do
              echo "[port-forward] Starting kubectl port-forward..."
              kubectl port-forward -n knodex svc/knodex-server 8080:8080 2>&1 || true
              echo "[port-forward] Process exited, restarting in 1s..."
              sleep 1
            done
          ) &
          echo $! > /tmp/port-forward-wrapper.pid

          echo "Waiting for server..."
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:8080/healthz > /dev/null 2>&1; do sleep 2; done'
          echo "Backend ready"

      - name: Run E2E tests
        run: |
          cd web
          npx playwright test
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: true

      - name: Stop port forward
        if: always()
        run: |
          if [ -f /tmp/port-forward-wrapper.pid ]; then
            kill $(cat /tmp/port-forward-wrapper.pid) 2>/dev/null || true
          fi
          pkill -f "kubectl port-forward" 2>/dev/null || true

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-kro-${{ matrix.kro_version }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14

      - name: Generate summary
        if: always()
        run: |
          echo "## E2E Test Summary (KRO ${{ matrix.kro_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "### All E2E tests passed! (KRO ${{ matrix.kro_version }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "### E2E tests failed (KRO ${{ matrix.kro_version }})" >> $GITHUB_STEP_SUMMARY
            echo "Check workflow logs for detailed failure information." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name "$KIND_CLUSTER" || true
