name: Label KRO Dependency PRs

on:
  pull_request:
    types: [opened, reopened, edited]

jobs:
  label-kro:
    name: Add KRO label
    # Check PR author (not event actor) so reopened/edited events work when
    # a human interacts with a Dependabot PR.
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (contains(github.event.pull_request.title, 'the kro group') ||
       contains(github.event.pull_request.title, 'kubernetes-sigs/kro'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Add kro label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['kro']
              });
            } catch (e) {
              // Label may not exist yet — create it and retry
              if (e.status === 422 || e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'kro',
                  color: '1d76db',
                  description: 'KRO upstream dependency update'
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['kro']
                });
              } else {
                throw e;
              }
            }
