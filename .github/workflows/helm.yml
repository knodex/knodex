name: Helm Chart

on:
  pull_request:
    paths:
      - 'deploy/charts/**'
      - '.github/configs/ct-*.yaml'
      - '.github/configs/lintconf.yaml'
      - '.github/workflows/helm.yml'

permissions:
  contents: read

jobs:
  chart-lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.0

      - name: Add Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct --config ./.github/configs/ct-lint.yaml list-changed)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ./.github/configs/ct-lint.yaml --lint-conf ./.github/configs/lintconf.yaml

      - name: Run helm template
        run: |
          helm dependency build deploy/charts/knodex
          helm template knodex deploy/charts/knodex --values deploy/charts/knodex/values.yaml > /dev/null

      - name: Verify LOCAL_LOGIN_ENABLED env injection (default + disabled fixture)
        run: |
          set -euo pipefail
          # Default values: LOCAL_LOGIN_ENABLED must render as "true"
          rendered_default=$(helm template knodex deploy/charts/knodex)
          if ! echo "$rendered_default" | grep -A1 "LOCAL_LOGIN_ENABLED" | grep -q '"true"'; then
            echo "::error::default render did not emit LOCAL_LOGIN_ENABLED=\"true\""
            echo "$rendered_default" | grep -A1 "LOCAL_LOGIN_ENABLED" || true
            exit 1
          fi
          # Disabled fixture: must render as "false" and the deployment must NOT
          # reference the local login route handler.
          rendered_disabled=$(helm template knodex deploy/charts/knodex \
            -f deploy/charts/knodex/ci/values-local-login-disabled.yaml)
          if ! echo "$rendered_disabled" | grep -A1 "LOCAL_LOGIN_ENABLED" | grep -q '"false"'; then
            echo "::error::disabled fixture did not emit LOCAL_LOGIN_ENABLED=\"false\""
            echo "$rendered_disabled" | grep -A1 "LOCAL_LOGIN_ENABLED" || true
            exit 1
          fi

      # Install testing is skipped on PRs because the Docker image for the
      # chart version doesn't exist yet in the registry. The E2E workflow
      # provides full deployment validation with locally-built images.
      # Lint + helm template above catch chart configuration issues.
